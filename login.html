<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>enter the lagoon</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="hero">
      <p class="eyebrow">your island is waiting</p>
      <h1>enter the lagoon</h1>
      <p class="subtitle">sign in to save your pearls, proofs, rituals, goals, and future self letters.</p>

      <div class="login-box">
        <input id="email" type="email" placeholder="email" />
        <input id="password" type="password" placeholder="password" />

        <button id="loginBtn">sign in</button>
        <button id="signupBtn" class="secondary">create account</button>

        <p id="authMessage"></p>
      </div>
    </section>
  </main>

  <script type="module" src="auth.js"></script>
</body>
</html>
