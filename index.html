<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mermaid manifestation world</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <p class="eyebrow">m.w. operating system</p>
      <h1>mermaid manifestation world</h1>
      <p class="subtitle">step into the cozy operating system for your future self.</p>

      <div class="stats">
        <div><span id="clock">--:--</span><small>current tide</small></div>
        <div><span id="currentRoom">island</span><small>you are here</small></div>
      </div>
    </header>

    <section id="islandView" class="view active-view">
      <div class="island-map">
        <button class="place lagoon" data-room="desire">🐚<span>desire lagoon</span></button>
        <button class="place reef" data-room="proof">🐠<span>proof reef</span></button>
        <button class="place library" data-room="oracle">📖<span>oracle library</span></button>
        <button class="place island" data-room="identity">🌴<span>identity island</span></button>
        <button class="place cave" data-room="ritual">🪸<span>ritual cave</span></button>
        <button class="place lighthouse" data-room="future">⭐<span>future lighthouse</span></button>
        <button class="place garden" data-room="abundance">🌺<span>abundance garden</span></button>

        <div class="ocean">🌊 🌊 🌊 🌊 🌊 🌊 🌊</div>
      </div>

      <p class="hint">click a location to enter your world.</p>
    </section>

    <section id="roomView" class="view">
      <button id="backToIsland" class="back-button">← back to island</button>
      <div id="roomContent"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
